<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolChart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1>SolChart</h1>
  </header>
<main class="hero">
  <section class="hero-content">

    <div class="group">
      <input required type="text" class="input">
      <span class="highlight"></span>
      <span class="bar"></span>
      <label>Paste Solana Wallet Address</label>
    </div>

    <a class="bt more-bt" href="javascript:void(0)">
      <span class="fl"></span>
      <span class="sfl"></span>
      <span class="cross"></span>
      <i></i>
      <p>Add</p>
    </a>

  </section>
</main>

  <footer>
    <p>&copy; 2026 SolChart. All rights reserved.</p>
  </footer>

</body>
</html>
