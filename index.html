<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolChart - Solana Wallet Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="container">
      <div class="logo-group">
        <div class="logo-icon">S</div>
        <span class="logo-text">SolChart</span>
      </div>
      <div class="status-badge">Shell Version 1.0</div>
    </div>
  </header>

  <main>
    <div class="container">
      
      <!-- Hero / Introduction Section -->
      <section class="hero">
        <h1>SolChart</h1>
        <p>Track Solana wallet activity with a clean visual dashboard.</p>
      </section>

      <!-- Dashboard Shell Wrapper -->
      <div class="dashboard-sections">

        <!-- Wallet Input Placeholder Card -->
        <section class="card">
          <h2 class="card-title">Wallet Address</h2>
          <div class="wallet-input-container">
            <input type="text" placeholder="Enter Solana wallet address (e.g. SRMu8Cw...)" disabled>
            <button type="button" disabled>Load Activity</button>
          </div>
        </section>

        <!-- Chart Placeholder Card -->
        <section class="card">
          <h2 class="card-title">Activity Visualizer</h2>
          
          <div class="chart-placeholder-wrapper">
            <!-- Static Placeholder SVG Chart Line -->
            <svg class="chart-placeholder-svg" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Grid Lines -->
              <line x1="0" y1="50" x2="800" y2="50" stroke="var(--grid)" stroke-dasharray="4 4" stroke-width="1.5"/>
              <line x1="0" y1="125" x2="800" y2="125" stroke="var(--grid)" stroke-dasharray="4 4" stroke-width="1.5"/>
              <line x1="0" y1="200" x2="800" y2="200" stroke="var(--grid)" stroke-dasharray="4 4" stroke-width="1.5"/>
              <line x1="0" y1="275" x2="800" y2="275" stroke="var(--grid)" stroke-dasharray="4 4" stroke-width="1.5"/>
              
              <!-- Placeholder Chart Line -->
              <path d="M 0 250 Q 100 230 200 180 T 400 120 T 600 210 T 800 90" 
                    stroke="var(--chart-line)" stroke-width="4" stroke-linecap="round" fill="none"/>
                    
              <!-- Marker Dots -->
              <circle cx="200" cy="180" r="6" fill="var(--chart-line)"/>
              <circle cx="400" cy="120" r="6" fill="var(--chart-line)"/>
              <circle cx="600" cy="210" r="6" fill="var(--chart-line)"/>
              <circle cx="800" cy="90" r="6" fill="var(--chart-line)"/>
            </svg>
            
            <div class="chart-info-overlay">
              <p>Visual chart dashboard placeholder</p>
            </div>
          </div>
        </section>

      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 SolChart. All rights reserved. Built as a minimal starter shell.</p>
    </div>
  </footer>

</body>
</html>
