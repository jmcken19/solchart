<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolChart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1>SolChart</h1>
  </header>

  <main class="hero">
    <section class="hero-content">

     <div class="group">
  <input required type="text" class="input">
  <span class="highlight"></span>
  <span class="bar"></span>
  <label>Paste Solana Wallet Address</label>
</div>

<a id="generateBtn" class="bt more-bt" href="javascript:void(0)">
  <span class="fl"></span>
  <span class="sfl"></span>
  <span class="cross"></span>
  <i></i>
  <p>Generate</p>
</a>
<p class="price-disclaimer">Prices are a snapshot and may not reflect 100% accuracy.</p>

<div class="chart-container hidden">
  <div class="chart-toggle">
    <button class="toggle-btn active" data-chart="holdings">Holdings</button>
    <button class="toggle-btn" data-chart="history">History</button>
  </div>
  <div class="period-toggle hidden">
    <button class="period-btn active" data-period="1W">1W</button>
    <button class="period-btn" data-period="1M">1M</button>
    <button class="period-btn" data-period="3M">3M</button>
  </div>
  <canvas id="walletChart"></canvas>
  <div class="wallet-total"></div>
</div>

    </section>
  </main>

  <footer>
    <p>&copy; 2026 SolChart. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>

</body>
</html>
